name: Günlük Öğle Yemeği Menüsü

on:
  schedule:
    # Her gün 06:30 UTC = 09:30 Türkiye (UTC+3)
    - cron: "30 6 * * 1-5"   # Hafta içi (Pzt–Cum)
  workflow_dispatch:          # Elle tetikleme (test için)

jobs:
  send-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları yükle
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Menüyü çek ve mail gönder
        env:
          PORTAL_USER: ${{ secrets.PORTAL_USER }}
          PORTAL_PASS: ${{ secrets.PORTAL_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_RECIPIENTS: ${{ secrets.MAIL_RECIPIENTS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py
